version: '3.8'

services:
  ios-agent-messenger:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8765:8765"    # Backend API
      - "12000:12000"  # VS Code Server (code-server)
    environment:
      - HOST=0.0.0.0
      - PORT=8765
      - LOG_LEVEL=info
      # VS Code Server configuration
      - VSCODE_SERVER_PORT=12000
      - WORKSPACE_DIR=/workspace
      # OpenHands SDK configuration (optional)
      - OPENHANDS_API_KEY=${OPENHANDS_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4}
      - LLM_API_KEY=${LLM_API_KEY:-}
    volumes:
      # Persist conversation data
      - messenger-data:/app/data
      # Workspace for VS Code
      - workspace-data:/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Development service with hot reload
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"    # Vite dev server
      - "8765:8765"    # Backend
      - "12000:12000"  # VS Code Server
    environment:
      - NODE_ENV=development
      - VITE_BACKEND_URL=http://localhost:8765
      - VSCODE_SERVER_PORT=12000
      - WORKSPACE_DIR=/workspace
    volumes:
      - .:/app
      - /app/node_modules
      - /app/python-backend/__pycache__
      - workspace-data:/workspace
    profiles:
      - dev

volumes:
  messenger-data:
  workspace-data:
